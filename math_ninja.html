<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Math Explorer</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --text-main: #c5c6c7;
            --accent-blue: #66fcf1;
            --accent-teal: #45a29e;
            --success: #4caf50;
            --warning: #ffb300;
            --danger: #f44336;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { color: var(--accent-blue); text-shadow: 0 0 10px rgba(102, 252, 241, 0.5); text-align: center; }

        .screen {
            background-color: var(--panel-bg);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            display: none;
            box-sizing: border-box;
        }

        .screen.active { display: block; }

        /* --- DASHBOARD --- */
        .planet-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .planet-btn {
            background-color: #2c3e50;
            color: white;
            border: 2px solid #34495e;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .planet-btn.unlocked {
            background-color: var(--accent-teal);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(69, 162, 158, 0.6);
        }
        .planet-btn.unlocked:active { transform: scale(0.9); }
        .planet-btn.locked { opacity: 0.4; cursor: not-allowed; }
        
        .planet-btn.mastered {
            background-color: var(--success);
            border-color: #81c784;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }

        /* --- CHART --- */
        .chart-container {
            background: #111;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            height: 200px;
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            border-left: 2px solid #555;
            border-bottom: 2px solid #555;
        }

        .goal-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 3px dashed var(--warning);
            z-index: 10;
        }

        .goal-label {
            position: absolute;
            right: 10px;
            top: -25px;
            color: var(--warning);
            font-size: 14px;
            font-weight: bold;
        }

        .chart-bar {
            flex: 1;
            background-color: var(--accent-blue);
            border-radius: 5px 5px 0 0;
            min-height: 5px;
            position: relative;
            transition: height 0.5s;
        }
        .chart-bar.fast { background-color: var(--success); }
        .chart-bar.slow { background-color: var(--danger); }
        
        .chart-tooltip {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: white;
            font-weight: bold;
        }

        .btn-large {
            background-color: var(--accent-blue);
            color: #000;
            border: none;
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 0 #3a8e88;
        }
        .btn-large:active { transform: translateY(5px); box-shadow: none; }

        /* --- GAMEPLAY --- */
        .hud { display: flex; justify-content: space-between; font-size: 24px; margin-bottom: 20px; font-weight: bold; }
        .timer { color: var(--warning); font-family: monospace; font-size: 30px;}
        
        .equation {
            font-size: 80px;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            color: white;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .answer-box {
            width: 120px;
            border-bottom: 5px solid var(--accent-blue);
            color: var(--accent-blue);
            text-align: center;
            min-height: 90px;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .dot { width: 15px; height: 15px; background: #555; border-radius: 50%; }
        .dot.done { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* NUMPAD */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .num-btn {
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #2c3e50;
        }
        .num-btn:active { transform: translateY(5px); box-shadow: none; }
        .num-btn.clear { background-color: var(--danger); box-shadow: 0 5px 0 #c62828; }

        /* --- REPORT SCREEN --- */
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .stat-value { font-size: 48px; font-weight: bold; color: var(--accent-blue); }
        .feedback { font-size: 24px; text-align: center; color: var(--warning); min-height: 40px; margin-bottom: 20px;}

        /* CONFETTI */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: var(--success);
            z-index: 1000;
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <h1>🚀 Space Math Explorer 🚀</h1>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard" class="screen active">
        <h2 style="text-align: center; margin-top: 0;">Select Your Planet</h2>
        <div class="planet-grid" id="planetGrid"></div>
        
        <h3 id="chartTitle" style="text-align: center; margin-top: 30px;">Progress: Planet 2</h3>
        <p style="text-align: center; font-size: 14px; color: #888;">Goal: 3.0 seconds per problem</p>
        <div class="chart-container" id="progressChart">
            <div class="goal-line" id="goalLine">
                <div class="goal-label">3.0s Goal</div>
            </div>
            <!-- Bars injected via JS -->
        </div>

        <button class="btn-large" onclick="startMission()">Launch Mission! 🛸</button>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="gameplay" class="screen">
        <div class="hud">
            <div>Planet <span id="currentPlanetDisp">2</span></div>
            <div class="timer" id="timerDisp">0.0s</div>
        </div>
        
        <div class="progress-dots" id="progressDots"></div>

        <div class="equation">
            <span id="factor1">2</span> 
            <span>×</span> 
            <span id="factor2">4</span> 
            <span>=</span>
            <div class="answer-box" id="answerBox"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="inputNum(1)">1</button>
            <button class="num-btn" onclick="inputNum(2)">2</button>
            <button class="num-btn" onclick="inputNum(3)">3</button>
            <button class="num-btn" onclick="inputNum(4)">4</button>
            <button class="num-btn" onclick="inputNum(5)">5</button>
            <button class="num-btn" onclick="inputNum(6)">6</button>
            <button class="num-btn" onclick="inputNum(7)">7</button>
            <button class="num-btn" onclick="inputNum(8)">8</button>
            <button class="num-btn" onclick="inputNum(9)">9</button>
            <button class="num-btn clear" onclick="clearNum()">Del</button>
            <button class="num-btn" onclick="inputNum(0)">0</button>
            <button class="num-btn clear" style="background:#888; box-shadow: 0 5px 0 #555" onclick="clearNum(true)">C</button>
        </div>
    </div>

    <!-- MISSION REPORT SCREEN -->
    <div id="report" class="screen">
        <h2 style="text-align: center; font-size: 36px; color: var(--success);">Mission Complete! 🌟</h2>
        
        <div class="stat-box">
            <div>Average Time per Problem</div>
            <div class="stat-value" id="avgTimeDisp">2.4s</div>
        </div>

        <div class="feedback" id="feedbackMsg"></div>

        <button class="btn-large" onclick="returnToDashboard()">Back to Mission Control</button>
    </div>

    <script>
        // --- GAME STATE & DATA ---
        const TARGET_GOAL_SECONDS = 3.0;
        let gameData = JSON.parse(localStorage.getItem('mathExplorerData')) || {
            unlockedPlanet: 2,
            history: {} // Format: { "2": [ { date: "...", avgTime: 2.5 } ] }
        };

        let selectedPlanet = gameData.unlockedPlanet;
        let currentQuestions = [];
        let questionIndex = 0;
        let startTime = 0;
        let timerInterval = null;
        let currentAnswer = "";

        // --- INIT ---
        function initDashboard() {
            // Build Planet Grid (2 through 12)
            const grid = document.getElementById('planetGrid');
            grid.innerHTML = '';
            for (let i = 2; i <= 12; i++) {
                let btn = document.createElement('div');
                btn.className = 'planet-btn ' + (i <= gameData.unlockedPlanet ? 'unlocked' : 'locked');
                
                // Check if mastered (has at least one score <= TARGET_GOAL_SECONDS)
                if (gameData.history[i] && gameData.history[i].some(run => run.avgTime <= TARGET_GOAL_SECONDS)) {
                    btn.classList.add('mastered');
                }

                btn.innerText = i;
                if (i <= gameData.unlockedPlanet) {
                    btn.onclick = () => selectPlanet(i);
                }
                grid.appendChild(btn);
            }
            selectPlanet(selectedPlanet > gameData.unlockedPlanet ? gameData.unlockedPlanet : selectedPlanet);
        }

        function selectPlanet(planetNum) {
            selectedPlanet = planetNum;
            document.getElementById('chartTitle').innerText = `Progress: Planet ${planetNum}`;
            renderChart(planetNum);
        }

        // --- CHARTING LOGIC ---
        function renderChart(planetNum) {
            const chart = document.getElementById('progressChart');
            const data = gameData.history[planetNum] || [];
            
            // Clear existing bars
            document.querySelectorAll('.chart-bar').forEach(e => e.remove());

            // We will graph up to the last 10 attempts
            const recentData = data.slice(-10);
            
            // Max Y value for the chart to scale properly (either 10 seconds, or highest actual time)
            let maxTime = Math.max(10, ...recentData.map(d => d.avgTime));
            
            // Position the goal line dynamically based on maxTime
            const goalLine = document.getElementById('goalLine');
            const goalPercentage = (TARGET_GOAL_SECONDS / maxTime) * 100;
            goalLine.style.bottom = `${goalPercentage}%`;

            recentData.forEach(run => {
                let bar = document.createElement('div');
                bar.className = 'chart-bar';
                
                // Color coding based on speed
                if (run.avgTime <= TARGET_GOAL_SECONDS) bar.classList.add('fast');
                else if (run.avgTime > 5.0) bar.classList.add('slow');

                // Height relative to maxTime
                let heightPct = (run.avgTime / maxTime) * 100;
                bar.style.height = `${heightPct}%`;

                // Tooltip
                let tt = document.createElement('div');
                tt.className = 'chart-tooltip';
                tt.innerText = run.avgTime.toFixed(1) + 's';
                bar.appendChild(tt);

                chart.appendChild(bar);
            });
        }

        // --- GAMEPLAY LOGIC ---
        function startMission() {
            // Generate packet (1 through 12, shuffled)
            currentQuestions = [];
            for (let i = 1; i <= 12; i++) {
                currentQuestions.push(i);
            }
            // Shuffle
            currentQuestions.sort(() => Math.random() - 0.5);
            
            questionIndex = 0;
            currentAnswer = "";

            // Setup UI
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('gameplay').classList.add('active');
            document.getElementById('currentPlanetDisp').innerText = selectedPlanet;
            
            // Setup Progress Dots
            const dots = document.getElementById('progressDots');
            dots.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                let dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = 'dot_' + i;
                dots.appendChild(dot);
            }

            loadQuestion();
            
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
        }

        function updateTimer() {
            let elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('timerDisp').innerText = elapsed.toFixed(1) + 's';
        }

        function loadQuestion() {
            currentAnswer = "";
            document.getElementById('answerBox').innerText = "";
            document.getElementById('factor1').innerText = selectedPlanet;
            document.getElementById('factor2').innerText = currentQuestions[questionIndex];
        }

        // INPUT HANDLING
        function inputNum(num) {
            if (currentAnswer.length < 3) {
                currentAnswer += num.toString();
                document.getElementById('answerBox').innerText = currentAnswer;
                checkAnswer();
            }
        }

        function clearNum(all = false) {
            if (all) {
                currentAnswer = "";
            } else {
                currentAnswer = currentAnswer.slice(0, -1);
            }
            document.getElementById('answerBox').innerText = currentAnswer;
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('gameplay').classList.contains('active')) return;
            if (e.key >= '0' && e.key <= '9') {
                inputNum(e.key);
            } else if (e.key === 'Backspace') {
                clearNum();
            }
        });

        function checkAnswer() {
            let correct = selectedPlanet * currentQuestions[questionIndex];
            
            // AUTO ADVANCE: Instantly check if they typed the exact correct answer.
            // If the correct answer is 2, typing '2' triggers this instantly.
            // If the correct answer is 20, typing '2' does not trigger, typing '0' triggers.
            if (parseInt(currentAnswer) === correct) {
                document.getElementById('dot_' + questionIndex).classList.add('done');
                questionIndex++;
                
                if (questionIndex >= 12) {
                    finishMission();
                } else {
                    loadQuestion();
                }
            }
        }

        // --- END GAME & SAVING ---
        function finishMission() {
            clearInterval(timerInterval);
            let totalTime = (Date.now() - startTime) / 1000;
            let avgTime = totalTime / 12;

            // Save Data
            if (!gameData.history[selectedPlanet]) {
                gameData.history[selectedPlanet] = [];
            }
            gameData.history[selectedPlanet].push({
                date: new Date().toISOString(),
                avgTime: avgTime
            });

            // Unlock Logic
            let feedback = "";
            let beatGoal = avgTime <= TARGET_GOAL_SECONDS;

            if (beatGoal) {
                if (selectedPlanet == gameData.unlockedPlanet && selectedPlanet < 12) {
                    gameData.unlockedPlanet++;
                    feedback = `Amazing speed! You unlocked Planet ${selectedPlanet + 1}! 🚀`;
                } else {
                    feedback = "Perfect! You're a Math Ninja! 🥷";
                }
                triggerConfetti();
            } else {
                feedback = `Great practice! Try to get under ${TARGET_GOAL_SECONDS.toFixed(1)}s to master this planet!`;
            }

            localStorage.setItem('mathExplorerData', JSON.stringify(gameData));

            // Show UI
            document.getElementById('gameplay').classList.remove('active');
            document.getElementById('report').classList.add('active');
            document.getElementById('avgTimeDisp').innerText = avgTime.toFixed(2) + 's';
            
            // Color code final time
            const avgDisp = document.getElementById('avgTimeDisp');
            avgDisp.style.color = beatGoal ? 'var(--success)' : (avgTime < 5 ? 'var(--warning)' : 'var(--danger)');
            
            document.getElementById('feedbackMsg').innerText = feedback;
        }

        function returnToDashboard() {
            document.getElementById('report').classList.remove('active');
            document.getElementById('dashboard').classList.add('active');
            initDashboard(); // Refresh UI and charts
        }

        // --- EFFECTS ---
        function triggerConfetti() {
            for (let i = 0; i < 50; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#66fcf1', '#4caf50', '#ffb300', '#f44336', '#fff'][Math.floor(Math.random()*5)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        // Start App
        initDashboard();

    </script>
</body>
</html>
